services:
    _defaults:
        autowire: true
        autoconfigure: true

    container.api.client:
        class: Productsup\CDE\ContainerApi\BaseClient\Client
        factory: '@App\ContainerApi\ContainerApiClientFactory'

    container.api:
        class: Productsup\CDE\ContainerApi\ContainerApi
        factory: '@App\ContainerApi\ContainerApiFactory'
        arguments:
            $containerApiClient: '@container.api.client'
